services:
  ocr-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ocr-api
    ports:
      - "8088:8088"
    environment:
      PORT: 8088
      GEMINI_MODEL: gemini-2.5-flash
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID}
      CLOUDFLARE_D1_DATABASE_ID: ${CLOUDFLARE_D1_DATABASE_ID}
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      SUPABASE_BUCKET: ocr_ai_receipt
      FRONTEND_ALLOWED_ORIGIN: ${FRONTEND_ALLOWED_ORIGIN:-http://localhost:3000}
    restart: unless-stopped
    networks:
      - ocr-network
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8088/health",
        ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  # Optional: Frontend service (uncomment if needed)
  # ocr-web:
  #   build:
  #     context: ./web
  #     dockerfile: Dockerfile
  #   container_name: ocr-web
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     NEXT_PUBLIC_API_URL: http://ocr-api:8088
  #   depends_on:
  #     - ocr-api
  #   restart: unless-stopped
  #   networks:
  #     - ocr-network

networks:
  ocr-network:
    driver: bridge
